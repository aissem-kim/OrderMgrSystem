version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ordermgr-postgres
    environment:
      POSTGRES_USER: ordermgr
      POSTGRES_PASSWORD: ordermgr123
      POSTGRES_DB: ordermgr_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ordermgr" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
