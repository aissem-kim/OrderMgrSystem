<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>상품 목록 및 주문</title>
    <style>
        :root {
            --bg: #f2efe7;
            --ink: #1b1f24;
            --card: #ffffff;
            --line: #d4cfc3;
            --brand: #0f6d5e;
            --accent: #d97706;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
            background: radial-gradient(circle at 20% 20%, #fff8eb 0%, var(--bg) 40%, #ebe5d7 100%);
            color: var(--ink);
            min-height: 100vh;
        }

        .wrap {
            max-width: 980px;
            margin: 0 auto;
            padding: 32px 20px 56px;
        }

        h1 {
            margin: 0 0 18px;
            font-size: 2rem;
            letter-spacing: -0.02em;
        }

        .panel {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(31, 41, 55, 0.06);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 14px;
        }

        .product {
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 14px;
            background: #fffdf8;
        }

        .name { font-weight: 700; margin-bottom: 8px; }
        .desc { font-size: 0.92rem; color: #4b5563; margin-bottom: 8px; min-height: 40px; }
        .price { color: var(--brand); font-weight: 700; margin-bottom: 10px; }

        label { display: block; margin-bottom: 6px; font-size: 0.9rem; color: #374151; }

        input {
            width: 100%;
            padding: 10px 11px;
            border: 1px solid #c8c3b8;
            border-radius: 10px;
            margin-bottom: 10px;
            background: #fff;
        }

        button {
            border: none;
            background: var(--brand);
            color: #fff;
            font-weight: 700;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        button:hover { transform: translateY(-1px); opacity: 0.95; }

        .empty {
            padding: 20px;
            border: 1px dashed #b8b1a4;
            border-radius: 12px;
            background: #fffdf6;
        }

        .hint {
            font-size: 0.85rem;
            color: #6b7280;
            margin-top: 8px;
        }

        @media (max-width: 640px) {
            .wrap { padding: 20px 14px 32px; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
<div class="wrap">
    <h1>상품 목록 및 주문 페이지</h1>

    <div class="panel">
        <label for="customerName">고객명</label>
        <input id="customerName" placeholder="홍길동" />

        <label for="customerEmail">이메일</label>
        <input id="customerEmail" placeholder="hong@example.com" />

        <label for="customerPhone">전화번호</label>
        <input id="customerPhone" placeholder="01012345678" />

        <div class="hint">주문하기 버튼은 Fetch API로 /api/orders 를 호출합니다.</div>
    </div>

    <div class="panel" th:if="${#lists.isEmpty(products)}">
        <div class="empty">등록된 상품이 없습니다. 먼저 상품을 등록해주세요.</div>
    </div>

    <div class="grid" th:if="${!#lists.isEmpty(products)}">
        <div class="product" th:each="p : ${products}">
            <div class="name" th:text="${p.name}">상품명</div>
            <div class="desc" th:text="${p.description}">상품 설명</div>
            <div class="price" th:text="|${#numbers.formatDecimal(p.price, 1, 'COMMA', 0, 'POINT')}원|">0원</div>

            <button type="button"
                    th:attr="data-product-id=${p.id},data-unit-price=${p.price}"
                    onclick="orderProduct(this)">
                주문하기
            </button>
        </div>
    </div>
</div>

<script>
    async function orderProduct(button) {
        const customerName = document.getElementById("customerName").value.trim();
        const customerEmail = document.getElementById("customerEmail").value.trim();
        const customerPhone = document.getElementById("customerPhone").value.trim();

        if (!customerName || !customerEmail || !customerPhone) {
            alert("고객 정보(이름/이메일/전화번호)를 모두 입력해주세요.");
            return;
        }

        const orderPayload = {
            customerName,
            customerEmail,
            customerPhone
        };

        try {
            const orderRes = await fetch("/api/orders", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(orderPayload)
            });

            const orderBody = await orderRes.json().catch(() => ({}));
            if (!orderRes.ok) {
                const message = orderBody.message || "주문 생성에 실패했습니다.";
                alert("실패: " + message);
                return;
            }

            alert("성공: 주문이 생성되었습니다. 주문번호=" + orderBody.orderNumber);
        } catch (error) {
            alert("실패: 네트워크 또는 서버 오류가 발생했습니다.");
            console.error(error);
        }
    }
</script>
</body>
</html>
